services:
  - type: web
    name: qpay-shopify
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: QPAY_USERNAME
        sync: false
      - key: QPAY_PASSWORD
        sync: false
      - key: QPAY_INVOICE_CODE
        sync: false
      - key: SHOPIFY_DOMAIN
        value: drift-ub.myshopify.com
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2024-10"
      - key: PUBLIC_URL
        sync: false
      - key: SHARED_SECRET
        generateValue: true
